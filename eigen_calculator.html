<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eigenvalue, Eigenvector & Diagonalization Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #eee;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    color: #00d4ff;
    font-size: 2em;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(0,212,255,0.3);
  }
  .subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 30px;
    font-size: 1em;
  }

  .input-section {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 20px;
  }
  .matrix-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .matrix-box {
    position: relative;
    padding: 15px 20px;
  }
  .matrix-box::before,
  .matrix-box::after,
  .matrix-render::before,
  .matrix-render::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 8px;
    pointer-events: none;
  }
  .matrix-box::before,
  .matrix-render::before {
    left: 0;
    border: 2px solid #00d4ff;
    border-right: none;
    border-radius: 8px 0 0 8px;
  }
  .matrix-box::after,
  .matrix-render::after {
    right: 0;
    border: 2px solid #00d4ff;
    border-left: none;
    border-radius: 0 8px 8px 0;
  }
  .matrix-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .matrix-grid input {
    width: 70px;
    padding: 12px;
    font-size: 1.2em;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    color: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .matrix-grid input:focus {
    outline: none;
    border-color: #00d4ff;
    box-shadow: 0 0 10px rgba(0,212,255,0.3);
  }
  .matrix-label {
    text-align: center;
    color: #aaa;
    margin-top: 10px;
    font-size: 0.9em;
  }
  .btn {
    background: linear-gradient(135deg, #00d4ff, #0099cc);
    color: #fff;
    border: none;
    padding: 14px 32px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.1em;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0,212,255,0.4);
  }
  .btn:active { transform: translateY(0); }

  .step-box {
    background: rgba(255,255,255,0.045);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 16px;
    border-left: 3px solid #00d4ff;
    box-shadow: 0 10px 28px rgba(0,0,0,0.14);
  }
  .step-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .step-num {
    width: 30px; height: 30px;
    background: #00d4ff;
    color: #1a1a2e;
    border-radius: 50%;
    text-align: center;
    line-height: 30px;
    font-weight: bold;
    font-size: 0.95em;
    flex-shrink: 0;
  }
  .step-title {
    color: #00d4ff;
    font-size: 1.15em;
    font-weight: 650;
  }
  .math-box,
  .math-box-left {
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 16px 18px;
    font-family: Cambria, 'Times New Roman', 'STIX Two Math', serif;
    font-size: 1.08em;
    margin: 10px 0;
    line-height: 1.75;
    overflow-x: auto;
  }
  .math-box { text-align: center; }
  .math-box-left { text-align: left; }
  .math-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.55rem;
    flex-wrap: wrap;
    margin: 0.35rem 0;
    white-space: normal;
  }
  .math-line.left { justify-content: flex-start; }
  .equation-line {
    font-weight: 650;
    color: #f4f9ff;
    letter-spacing: 0.01em;
  }
  .equation-caption {
    color: #aaa;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 0.94em;
    line-height: 1.45;
    margin: 0.25rem 0 0.5rem;
  }
  .result-sequence {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    margin: 0.7rem 0;
  }
  .down-arrow {
    color: #00d4ff;
    font-size: 1.45rem;
    line-height: 1;
    text-shadow: 0 0 12px rgba(0,212,255,0.35);
  }
  .matrix-render {
    position: relative;
    display: inline-grid;
    grid-auto-rows: minmax(1.55em, auto);
    align-items: center;
    justify-content: center;
    padding: 0.28em 0.72em;
    margin: 0.15em 0.12em;
    vertical-align: middle;
    line-height: 1.2;
    color: #f6fbff;
    background: rgba(255,255,255,0.025);
  }
  .matrix-cell {
    min-width: 3.15ch;
    text-align: center;
    padding: 0.18em 0.58em;
    font-variant-numeric: tabular-nums lining-nums;
    white-space: nowrap;
  }
  .matrix-cell.wide { min-width: 5.25ch; }
  .matrix-name {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #00d4ff;
    letter-spacing: 0.02em;
  }
  .matrix-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.45rem;
    margin: 0.45rem 0;
  }
  .matrix-row-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin: 0.45rem 0;
  }
  .matrix-inverse-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.7rem;
    flex-wrap: wrap;
    margin: 0.5rem 0;
  }
  .scalar-fraction {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 2.8rem;
    font-weight: 700;
    line-height: 1.1;
    color: #ffcc00;
  }
  .scalar-fraction .bar {
    width: 100%;
    border-top: 2px solid currentColor;
    margin: 0.13rem 0;
  }
  .substep-title {
    color: #ffcc00;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: 700;
    margin: 0.85rem 0 0.35rem;
  }
  .final-matrix {
    margin-top: 0.55rem;
  }
  .highlight-blue { color: #00d4ff; font-weight: bold; }
  .highlight-yellow { color: #ffcc00; font-weight: bold; }
  .highlight-green { color: #00ff80; font-weight: bold; }
  .highlight-red { color: #ff6b6b; font-weight: bold; }
  .highlight-purple { color: #cc88ff; font-weight: bold; }

  .result-box {
    background: rgba(0,255,128,0.08);
    border: 2px solid #00ff80;
    border-radius: 12px;
    padding: 25px;
    margin-top: 15px;
  }
  .result-box h3 {
    color: #00ff80;
    margin-bottom: 15px;
    font-size: 1.2em;
    text-align: center;
  }
  .eigen-item {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .eigen-item:last-child { margin-bottom: 0; }
  .eigen-label {
    color: #aaa;
    font-size: 0.9em;
    margin-bottom: 8px;
  }
  .eigen-value {
    font-family: Cambria, 'Times New Roman', 'STIX Two Math', serif;
    font-size: 1.15em;
    line-height: 1.8;
  }
  .lambda { color: #ffcc00; font-weight: bold; }
  .vector { color: #00ff80; font-weight: bold; }
  .clean-vector { color: #00d4ff; font-weight: bold; }
  .note {
    color: #aaa;
    font-size: 0.9em;
    margin-top: 6px;
    font-style: italic;
  }
  .verify-pass { color: #00ff80; font-weight: bold; }
  .verify-fail { color: #ff6b6b; font-weight: bold; }
  .check-pass { color: #00ff80; font-weight: bold; }
  .check-fail { color: #ff6b6b; font-weight: bold; }
  .no-real {
    background: rgba(255,107,107,0.1);
    border: 2px solid #ff6b6b;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: #ff6b6b;
    font-size: 1.1em;
  }
  .collapsible {
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 12px;
    margin: 12px 0;
    overflow: hidden;
  }
  .collapsible-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    cursor: pointer;
    color: #00d4ff;
    font-weight: 700;
    user-select: none;
    background: rgba(0,212,255,0.055);
  }
  .collapsible-arrow { transition: transform 0.2s ease; }
  .collapsible.open .collapsible-arrow { transform: rotate(90deg); }
  .collapsible-content { display: none; padding: 4px 16px 16px; }
  .collapsible.open .collapsible-content { display: block; }
  .power-input-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 15px 0;
    flex-wrap: wrap;
  }
  .power-input-row label { color:#aaa; }
  .power-input-row input {
    width: 70px;
    padding: 8px;
    text-align: center;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1a1a2e;
    color: #fff;
  }

  @media (max-width: 560px) {
    body { padding: 12px; }
    h1 { font-size: 1.45em; }
    .input-section { padding: 20px; }
    .matrix-grid input { width: 60px; padding: 10px; font-size: 1em; }
    .btn { padding: 12px 24px; font-size: 1em; }
    .step-box { padding: 17px; }
    .math-box, .math-box-left { padding: 14px 12px; }
    .matrix-cell { padding: 0.16em 0.42em; min-width: 2.5ch; }
    .matrix-cell.wide { min-width: 4.2ch; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>&#128302; Eigenvalue, Eigenvector & Diagonalization Calculator</h1>
  <p class="subtitle">Enter any 2&times;2 matrix and see a notebook-style step-by-step solution</p>

  <div class="input-section">
    <div class="matrix-wrapper">
      <div>
        <div class="matrix-box">
          <div class="matrix-grid">
            <input type="number" id="a11" value="7" step="any">
            <input type="number" id="a12" value="6" step="any">
            <input type="number" id="a21" value="6" step="any">
            <input type="number" id="a22" value="2" step="any">
          </div>
        </div>
        <div class="matrix-label">Matrix A</div>
      </div>
      <button class="btn" onclick="calculate()">&#128269; Calculate</button>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
function formatNum(n, digits) {
  if (digits === undefined) digits = 4;
  if (!isFinite(n)) return String(n);
  if (Math.abs(n) < 1e-10) return '0';
  var s = Number(n).toFixed(digits);
  s = s.replace(/\.0+$/, '');
  s = s.replace(/(\.\d*[1-9])0+$/, '$1');
  return s;
}

function escapeHTML(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatFraction(n, maxDenom) {
  if (Math.abs(n) < 1e-10) return { num: 0, den: 1, text: '0' };
  var bestNum = 1, bestDen = 1, bestErr = 999;
  for (var den = 1; den <= maxDenom; den++) {
    var num = Math.round(n * den);
    var err = Math.abs(n - num / den);
    if (err < bestErr) {
      bestErr = err;
      bestNum = num;
      bestDen = den;
    }
  }
  if (bestErr < 0.001) {
    var g = gcd(Math.abs(bestNum), bestDen);
    bestNum /= g;
    bestDen /= g;
    if (bestDen === 1) return { num: bestNum, den: 1, text: '' + bestNum };
    return { num: bestNum, den: bestDen, text: bestNum + '/' + bestDen };
  }
  return null;
}

function gcd(a, b) {
  a = Math.round(Math.abs(a));
  b = Math.round(Math.abs(b));
  if (a === 0) return b || 1;
  if (b === 0) return a || 1;
  while (b) { var t = b; b = a % b; a = t; }
  return a;
}

function matrixEntry(value, digits) {
  if (typeof value === 'number') return formatNum(value, digits);
  return String(value);
}

function matrixHTML(rows, options) {
  options = options || {};
  var digits = options.digits === undefined ? 4 : options.digits;
  var cols = rows[0] ? rows[0].length : 0;
  var cellClass = options.wide ? 'matrix-cell wide' : 'matrix-cell';
  var html = '<span class="matrix-render" style="grid-template-columns: repeat(' + cols + ', max-content);">';
  for (var r = 0; r < rows.length; r++) {
    for (var c = 0; c < rows[r].length; c++) {
      html += '<span class="' + cellClass + '">' + matrixEntry(rows[r][c], digits) + '</span>';
    }
  }
  html += '</span>';
  return html;
}

function columnHTML(values, digits) {
  return matrixHTML(values.map(function(v) { return [v]; }), { digits: digits });
}

function zeroColumnHTML() {
  return columnHTML([0, 0], 0);
}

function scalarFractionHTML(num, den) {
  return '<span class="scalar-fraction"><span>' + escapeHTML(num) + '</span><span class="bar"></span><span>' + escapeHTML(den) + '</span></span>';
}

function mathBox(content, alignLeft) {
  return '<div class="' + (alignLeft ? 'math-box-left' : 'math-box') + '">' + content + '</div>';
}

function stepBox(num, title, content) {
  return '<div class="step-box">' +
    '<div class="step-header"><div class="step-num">' + num + '</div><div class="step-title">' + title + '</div></div>' +
    content +
    '</div>';
}

function line(content, left) {
  return '<div class="math-line' + (left ? ' left' : '') + '">' + content + '</div>';
}

function equation(content) {
  return '<div class="equation-line">' + content + '</div>';
}

function caption(content) {
  return '<p class="equation-caption">' + content + '</p>';
}

function matrixResult(label, matrix, digits) {
  return mathBox(
    '<div class="result-sequence">' +
      equation(label) +
      '<div class="final-matrix">' + matrixHTML(matrix, { digits: digits, wide: true }) + '</div>' +
    '</div>'
  );
}

function transformationResult(label, matrix, dMatrix, digits) {
  return mathBox(
    '<div class="result-sequence">' +
      equation(label) +
      '<div class="down-arrow">&darr;</div>' +
      matrixHTML(matrix, { digits: digits, wide: true }) +
      equation('D') +
      '<div class="down-arrow">&darr;</div>' +
      matrixHTML(dMatrix, { digits: digits, wide: true }) +
      '<div class="verify-pass">&#9989; ' + label + ' = D</div>' +
    '</div>'
  );
}

function vectorText(v, digits) {
  return '(' + formatNum(v.x, digits) + ', ' + formatNum(v.y, digits) + ')';
}

function verifyEigenvector(A, eigenvalue, v) {
  var Av = [
    A[0][0] * v[0] + A[0][1] * v[1],
    A[1][0] * v[0] + A[1][1] * v[1]
  ];
  var lambdaV = [
    eigenvalue * v[0],
    eigenvalue * v[1]
  ];
  var tolerance = 1e-8;
  var isCorrect =
    Math.abs(Av[0] - lambdaV[0]) < tolerance &&
    Math.abs(Av[1] - lambdaV[1]) < tolerance;
  return { Av: Av, lambdaV: lambdaV, isCorrect: isCorrect };
}

function findCleanEigenvector(a, b, c, d, lambda) {
  var m11 = a - lambda;
  var m12 = b;
  var m21 = c;
  var m22 = d - lambda;
  var ratio = null;

  if (Math.abs(m11) > 1e-6 && Math.abs(m12) > 1e-6) {
    ratio = -m12 / m11;
  } else if (Math.abs(m21) > 1e-6 && Math.abs(m22) > 1e-6) {
    ratio = -m22 / m21;
  } else if (Math.abs(m11) > 1e-6) {
    return { x: 0, y: 1, clean: true };
  } else if (Math.abs(m22) > 1e-6) {
    return { x: 1, y: 0, clean: true };
  } else {
    return { x: 1, y: 0, clean: true };
  }

  var bestX = 0, bestY = 1, bestError = 999;
  for (var y = 1; y <= 20; y++) {
    var x = ratio * y;
    var roundedX = Math.round(x);
    var error = Math.abs(x - roundedX);
    if (error < bestError) { bestError = error; bestX = roundedX; bestY = y; }
  }
  for (var yy = -1; yy >= -20; yy--) {
    var xx = ratio * yy;
    var roundedXX = Math.round(xx);
    var errorXX = Math.abs(xx - roundedXX);
    if (errorXX < bestError) { bestError = errorXX; bestX = roundedXX; bestY = yy; }
  }

  if (bestError < 0.01 && Math.abs(bestX) <= 20 && Math.abs(bestY) <= 20) {
    var g = gcd(Math.abs(bestX), Math.abs(bestY));
    bestX /= g;
    bestY /= g;
    if (bestX < 0 || (bestX === 0 && bestY < 0)) { bestX = -bestX; bestY = -bestY; }
    return { x: bestX, y: bestY, clean: true };
  }

  var vx, vy;
  if (Math.abs(m11) > Math.abs(m21) || Math.abs(m12) > Math.abs(m22)) {
    if (Math.abs(m12) > 1e-10) { vx = m12; vy = -m11; }
    else if (Math.abs(m11) > 1e-10) { vx = -m12; vy = m11; }
    else { vx = 1; vy = 0; }
  } else {
    if (Math.abs(m22) > 1e-10) { vx = -m22; vy = m21; }
    else if (Math.abs(m21) > 1e-10) { vx = m22; vy = -m21; }
    else { vx = 0; vy = 1; }
  }
  var len = Math.sqrt(vx * vx + vy * vy);
  if (len > 1e-10) { vx /= len; vy /= len; }
  if (Math.abs(vx) > 1e-10 && vx < 0) { vx = -vx; vy = -vy; }
  else if (Math.abs(vx) < 1e-10 && vy < 0) { vx = -vx; vy = -vy; }
  return { x: vx, y: vy, clean: false };
}

function computeNormalized(a, b, c, d, lambda) {
  var m11 = a - lambda;
  var m12 = b;
  var m21 = c;
  var m22 = d - lambda;
  var x, y;
  if (Math.abs(m11) > Math.abs(m21) || Math.abs(m12) > Math.abs(m22)) {
    if (Math.abs(m12) > 1e-10) { x = m12; y = -m11; }
    else if (Math.abs(m11) > 1e-10) { x = -m12; y = m11; }
    else { x = 1; y = 0; }
  } else {
    if (Math.abs(m22) > 1e-10) { x = -m22; y = m21; }
    else if (Math.abs(m21) > 1e-10) { x = m22; y = -m21; }
    else { x = 0; y = 1; }
  }
  var len = Math.sqrt(x * x + y * y);
  if (len > 1e-10) { x /= len; y /= len; }
  if (Math.abs(x) > 1e-10 && x < 0) { x = -x; y = -y; }
  else if (Math.abs(x) < 1e-10 && y < 0) { x = -x; y = -y; }
  return { x: x, y: y };
}

function deriveEigenvector(a, b, c, d, lambda) {
  var m11 = a - lambda;
  var m12 = b;
  var m21 = c;
  var m22 = d - lambda;
  var useRow1 = Math.abs(m11) > 1e-6 || Math.abs(m12) > 1e-6;
  var useRow2 = Math.abs(m21) > 1e-6 || Math.abs(m22) > 1e-6;
  var chosenRow = 1;
  if (!useRow1) chosenRow = 2;
  else if (!useRow2) chosenRow = 1;
  else {
    var max1 = Math.max(Math.abs(m11), Math.abs(m12));
    var max2 = Math.max(Math.abs(m21), Math.abs(m22));
    chosenRow = (max1 <= max2) ? 1 : 2;
  }
  var coeff1 = chosenRow === 1 ? m11 : m21;
  var coeff2 = chosenRow === 1 ? m12 : m22;
  var eqStr = '';
  if (Math.abs(coeff1) > 1e-6) eqStr += formatNum(coeff1, 3) + 'x';
  if (Math.abs(coeff2) > 1e-6) {
    if (coeff2 > 0 && eqStr !== '') eqStr += ' + ';
    else if (coeff2 < 0 && eqStr !== '') eqStr += ' &minus; ';
    else if (coeff2 < 0) eqStr += '&minus;';
    eqStr += formatNum(Math.abs(coeff2), 3) + 'y';
  }
  eqStr += ' = 0';

  var solvedFor = '';
  if (Math.abs(coeff2) > 1e-6) {
    var ratio = -coeff1 / coeff2;
    var frac = formatFraction(ratio, 12);
    solvedFor = frac && frac.den !== 1 ? 'y = ' + frac.text + 'x' : 'y = ' + formatNum(ratio, 4) + 'x';
  } else if (Math.abs(coeff1) > 1e-6) {
    solvedFor = 'x = 0, so y is the free variable';
  } else {
    solvedFor = 'Both coefficients are zero, so any vector in this eigenspace direction works';
  }

  var v = findCleanEigenvector(a, b, c, d, lambda);
  return {
    v: v,
    m: [[m11, m12], [m21, m22]],
    chosenRow: chosenRow,
    rowEquation: eqStr,
    solvedFor: solvedFor
  };
}

function matMul(A, B) {
  return [
    A[0] * B[0] + A[1] * B[2], A[0] * B[1] + A[1] * B[3],
    A[2] * B[0] + A[3] * B[2], A[2] * B[1] + A[3] * B[3]
  ];
}

function mat2(rowsFlat) {
  return [[rowsFlat[0], rowsFlat[1]], [rowsFlat[2], rowsFlat[3]]];
}

function getDiagonalizationData(a, b, c, d) {
  var trace = a + d;
  var det = a * d - b * c;
  var disc = trace * trace - 4 * det;
  if (disc < 0) return { ok: false, reason: 'complex' };
  var sqrtDisc = Math.sqrt(disc);
  var e1 = (trace + sqrtDisc) / 2;
  var e2 = (trace - sqrtDisc) / 2;
  if (Math.abs(e1 - e2) < 1e-6) return { ok: false, reason: 'repeated', e1: e1, e2: e2 };
  var v1 = findCleanEigenvector(a, b, c, d, e1);
  var v2 = findCleanEigenvector(a, b, c, d, e2);
  var q11 = v1.x, q12 = v2.x;
  var q21 = v1.y, q22 = v2.y;
  var detQ = q11 * q22 - q12 * q21;
  if (Math.abs(detQ) < 1e-10) return { ok: false, reason: 'singular', e1: e1, e2: e2 };
  var invQ11 = q22 / detQ;
  var invQ12 = -q12 / detQ;
  var invQ21 = -q21 / detQ;
  var invQ22 = q11 / detQ;

  function qmqInv(M) {
    var temp0 = q11 * M[0] + q12 * M[2];
    var temp1 = q11 * M[1] + q12 * M[3];
    var temp2 = q21 * M[0] + q22 * M[2];
    var temp3 = q21 * M[1] + q22 * M[3];
    return [
      temp0 * invQ11 + temp1 * invQ21, temp0 * invQ12 + temp1 * invQ22,
      temp2 * invQ11 + temp3 * invQ21, temp2 * invQ12 + temp3 * invQ22
    ];
  }

  return {
    ok: true,
    trace: trace,
    det: det,
    disc: disc,
    e1: e1,
    e2: e2,
    v1: v1,
    v2: v2,
    q: [[q11, q12], [q21, q22]],
    dmat: [[e1, 0], [0, e2]],
    detQ: detQ,
    invQ: [[invQ11, invQ12], [invQ21, invQ22]],
    adjQ: [[q22, -q12], [-q21, q11]],
    qmqInv: qmqInv
  };
}

function renderEigenvectorDerivation(label, lambda, derivation) {
  var v = derivation.v;
  var chooseText = v.clean
    ? 'Choose x = ' + formatNum(v.x, 4) + ', y = ' + formatNum(v.y, 4)
    : 'Use the normalized direction below';
  return mathBox(
    caption(label + ' = <span class="lambda">' + formatNum(lambda, 4) + '</span>') +
    line(equation('(A &minus; ' + formatNum(lambda, 4) + 'I)v = 0')) +
    '<div class="matrix-row-display">' +
      matrixHTML(derivation.m, { digits: 3, wide: true }) +
      columnHTML(['x', 'y'], 0) +
      '<span>=</span>' +
      zeroColumnHTML() +
    '</div>' +
    line('<span class="highlight-purple">From row ' + derivation.chosenRow + ':</span> ' + derivation.rowEquation) +
    line('<span class="highlight-blue">' + derivation.solvedFor + '</span>') +
    line('<span class="highlight-blue">' + chooseText + '</span>') +
    '<div class="result-sequence">' +
      equation('v =') +
      columnHTML([v.x, v.y], 4) +
    '</div>',
    true
  );
}

function renderEigenvectorVerification(A, lambda, v, subscript) {
  var check = verifyEigenvector(A, lambda, [v.x, v.y]);
  var ok = check.isCorrect;
  return mathBox(
    caption('Verify v<sub>' + subscript + '</sub> with &lambda;<sub>' + subscript + '</sub> = ' + formatNum(lambda, 4)) +
    '<div class="result-sequence">' +
      equation('Av<sub>' + subscript + '</sub>') +
      '<div class="down-arrow">&darr;</div>' +
      '<div class="matrix-row-display">' +
        matrixHTML(A, { digits: 4, wide: true }) +
        columnHTML([v.x, v.y], 4) +
        '<span>=</span>' +
        columnHTML(check.Av, 4) +
      '</div>' +
      equation('&lambda;<sub>' + subscript + '</sub>v<sub>' + subscript + '</sub>') +
      '<div class="down-arrow">&darr;</div>' +
      '<div class="matrix-row-display">' +
        '<span>' + formatNum(lambda, 4) + '</span><span>&times;</span>' +
        columnHTML([v.x, v.y], 4) +
        '<span>=</span>' +
        columnHTML(check.lambdaV, 4) +
      '</div>' +
      '<div class="' + (ok ? 'verify-pass' : 'verify-fail') + '">' +
        (ok ? '&#9989; Eigenvector v<sub>' + subscript + '</sub> is correct' : '&#10060; Eigenvector verification failed') +
      '</div>' +
    '</div>'
  );
}

function renderMatrixFunction(title, formulaName, diagonalLabel, diagMatrix, finalMatrix, digits) {
  return '<p style="color:#aaa; margin:15px 0 8px;"><strong>' + title + '</strong></p>' +
    mathBox(
      '<div class="substep-title">Step 1</div>' +
      line(equation(diagonalLabel)) +
      '<div class="substep-title">Step 2</div>' +
      '<div class="result-sequence">' + matrixHTML(diagMatrix, { digits: digits, wide: true }) + '</div>' +
      '<div class="substep-title">Step 3</div>' +
      line(equation(formulaName)) +
      '<div class="substep-title">Step 4</div>' +
      '<div class="result-sequence">' + matrixHTML(finalMatrix, { digits: digits, wide: true }) + '</div>'
    );
}

function toggleCollapse(header) {
  var parent = header.closest('.collapsible');
  parent.classList.toggle('open');
}

function calculate() {
  var a = parseFloat(document.getElementById('a11').value) || 0;
  var b = parseFloat(document.getElementById('a12').value) || 0;
  var c = parseFloat(document.getElementById('a21').value) || 0;
  var d = parseFloat(document.getElementById('a22').value) || 0;

  var A = [[a, b], [c, d]];
  var trace = a + d;
  var det = a * d - b * c;
  var disc = trace * trace - 4 * det;
  var html = '';

  html += stepBox(1, 'Given Matrix', mathBox(
    '<div class="result-sequence">' + equation('A') + matrixHTML(A, { digits: 4, wide: true }) + '</div>'
  ));

  html += stepBox(2, 'Characteristic Equation',
    caption('Solve det(A &minus; &lambda;I) = 0') +
    mathBox(
      '<div class="result-sequence">' +
        equation('A &minus; &lambda;I') +
        matrixHTML([
          ['<span class="highlight-blue">' + formatNum(a, 4) + '</span>&minus;&lambda;', '<span class="highlight-blue">' + formatNum(b, 4) + '</span>'],
          ['<span class="highlight-blue">' + formatNum(c, 4) + '</span>', '<span class="highlight-blue">' + formatNum(d, 4) + '</span>&minus;&lambda;']
        ], { wide: true }) +
        equation('det(A &minus; &lambda;I) = 0') +
      '</div>'
    )
  );

  var c2 = -trace;
  var c3 = det;
  html += stepBox(3, 'Expand the Determinant',
    mathBox(line('(<span class="highlight-blue">' + formatNum(a, 4) + '</span> &minus; &lambda;)(<span class="highlight-blue">' + formatNum(d, 4) + '</span> &minus; &lambda;) &minus; (<span class="highlight-blue">' + formatNum(b, 4) + '</span>)(<span class="highlight-blue">' + formatNum(c, 4) + '</span>) = 0')) +
    mathBox(line('&lambda;&sup2; <span class="highlight-yellow">' + (c2 >= 0 ? '+ ' : '&minus; ') + formatNum(Math.abs(c2), 4) + '</span>&lambda; <span class="highlight-yellow">' + (c3 >= 0 ? '+ ' : '&minus; ') + formatNum(Math.abs(c3), 4) + '</span> = 0'))
  );

  var step4 = mathBox(line('&Delta; = trace&sup2; &minus; 4&middot;det = (' + formatNum(trace, 4) + ')&sup2; &minus; 4&middot;(' + formatNum(det, 4) + ') = <span class="highlight-green">' + formatNum(disc, 4) + '</span>'));

  if (disc < 0) {
    step4 += mathBox('<span class="highlight-red">&Delta; &lt; 0 &rarr; no real eigenvalues</span><br>This matrix has no real eigenvector directions.');
    html += stepBox(4, 'Solve for Eigenvalues', step4);
    html += '<div class="no-real">&#10060; No real eigenvalues exist for this matrix.</div>';
    document.getElementById('output').innerHTML = html;
    return;
  }

  var sqrtDisc = Math.sqrt(disc);
  var e1 = (trace + sqrtDisc) / 2;
  var e2 = (trace - sqrtDisc) / 2;
  step4 += mathBox(line('&lambda; = (trace &plusmn; &radic;&Delta;) / 2 = (' + formatNum(trace, 4) + ' &plusmn; ' + formatNum(sqrtDisc, 4) + ') / 2'));
  step4 += mathBox(line('&lambda;<sub>1</sub> = <span class="lambda">' + formatNum(e1, 4) + '</span>'));
  step4 += mathBox(line('&lambda;<sub>2</sub> = <span class="lambda">' + formatNum(e2, 4) + '</span>'));
  html += stepBox(4, 'Solve for Eigenvalues', step4);

  var sumEigen = e1 + e2;
  var productEigen = e1 * e2;
  var tolerance = 1e-8;
  var traceCheck = Math.abs(sumEigen - trace) < tolerance;
  var detCheck = Math.abs(productEigen - det) < tolerance;
  html += stepBox(5, 'Check Eigenvalues',
    caption('Verify using trace and determinant properties:') +
    mathBox(
      '&lambda;<sub>1</sub> + &lambda;<sub>2</sub> = trace(A)<br>' +
      '<span class="highlight-yellow">' + formatNum(e1, 4) + '</span> + <span class="highlight-yellow">' + formatNum(e2, 4) + '</span> = <span class="highlight-blue">' + formatNum(sumEigen, 4) + '</span><br>' +
      'trace(A) = <span class="highlight-blue">' + formatNum(trace, 4) + '</span><br>' +
      '<span class="' + (traceCheck ? 'check-pass' : 'check-fail') + '">' + (traceCheck ? '&#9989; Trace check passed' : '&#10060; Trace check failed') + '</span>'
    ) +
    mathBox(
      '&lambda;<sub>1</sub> &times; &lambda;<sub>2</sub> = det(A)<br>' +
      '<span class="highlight-yellow">' + formatNum(e1, 4) + '</span> &times; <span class="highlight-yellow">' + formatNum(e2, 4) + '</span> = <span class="highlight-blue">' + formatNum(productEigen, 4) + '</span><br>' +
      'det(A) = <span class="highlight-blue">' + formatNum(det, 4) + '</span><br>' +
      '<span class="' + (detCheck ? 'check-pass' : 'check-fail') + '">' + (detCheck ? '&#9989; Determinant check passed' : '&#10060; Determinant check failed') + '</span>'
    ) +
    '<p style="color:' + (traceCheck && detCheck ? '#00ff80' : '#ff6b6b') + '; margin-top:10px; font-weight:bold;">' +
      (traceCheck && detCheck ? '&#9989; Eigenvalues are correct.' : '&#10060; Eigenvalue verification failed.') +
    '</p>'
  );

  var derive1 = deriveEigenvector(a, b, c, d, e1);
  var v1 = derive1.v;
  var v1norm = computeNormalized(a, b, c, d, e1);
  var hasDistinctEigenvalues = Math.abs(e1 - e2) > 1e-6;
  var derive2 = null;
  var v2 = null;
  var v2norm = null;

  var eigenvectorHtml = renderEigenvectorDerivation('&lambda;<sub>1</sub>', e1, derive1);
  if (!v1.clean) {
    eigenvectorHtml += '<p class="note">Normalized: ' + vectorText(v1norm, 4) + '</p>';
  }
  if (hasDistinctEigenvalues) {
    derive2 = deriveEigenvector(a, b, c, d, e2);
    v2 = derive2.v;
    v2norm = computeNormalized(a, b, c, d, e2);
    eigenvectorHtml += renderEigenvectorDerivation('&lambda;<sub>2</sub>', e2, derive2);
    if (!v2.clean) {
      eigenvectorHtml += '<p class="note">Normalized: ' + vectorText(v2norm, 4) + '</p>';
    }
  } else {
    eigenvectorHtml += '<p style="color:#ffcc00; margin-top:15px;">&#9888; Repeated eigenvalue &mdash; this calculator does not construct a second independent eigenspace direction automatically.</p>';
  }
  html += stepBox(6, 'Find Eigenvectors', eigenvectorHtml);

  var verifyHtml = renderEigenvectorVerification(A, e1, v1, 1);
  if (hasDistinctEigenvalues && v2) {
    verifyHtml += renderEigenvectorVerification(A, e2, v2, 2);
  }
  html += stepBox(7, 'Verify Eigenvectors', verifyHtml);

  if (!hasDistinctEigenvalues) {
    html += stepBox(8, 'Diagonalization Status', '<p class="verify-fail">&#10060; Diagonalization requires a full basis of independent eigenvectors. Because the eigenvalue is repeated here, the calculator stops before forming Q and D.</p>');
    html += renderFinalAnswer(e1, e2, v1, null, v1norm, null, false);
    document.getElementById('output').innerHTML = html;
    return;
  }

  var data = getDiagonalizationData(a, b, c, d);
  html += stepBox(8, 'Form Q',
    caption('Q is formed by putting the eigenvectors as columns:') +
    matrixResult('Q', data.q, 4) +
    '<p class="note">Column 1 = v<sub>1</sub>, Column 2 = v<sub>2</sub></p>'
  );

  html += stepBox(9, 'Form D',
    caption('D is a diagonal matrix with eigenvalues in the same order as the columns of Q:') +
    matrixResult('D', data.dmat, 4) +
    '<p class="note">&lambda;<sub>1</sub> goes in position (1,1), &lambda;<sub>2</sub> goes in position (2,2)</p>'
  );

  var q11 = data.q[0][0], q12 = data.q[0][1], q21 = data.q[1][0], q22 = data.q[1][1];
  var aq = [
    a * q11 + b * q21, a * q12 + b * q22,
    c * q11 + d * q21, c * q12 + d * q22
  ];
  var qd = [
    q11 * e1, q12 * e2,
    q21 * e1, q22 * e2
  ];
  var invQ = [data.invQ[0][0], data.invQ[0][1], data.invQ[1][0], data.invQ[1][1]];
  var result = [
    invQ[0] * aq[0] + invQ[1] * aq[2], invQ[0] * aq[1] + invQ[1] * aq[3],
    invQ[2] * aq[0] + invQ[3] * aq[2], invQ[2] * aq[1] + invQ[3] * aq[3]
  ];
  var diagCheck = Math.abs(result[0] - e1) < 1e-6 && Math.abs(result[1]) < 1e-6 && Math.abs(result[2]) < 1e-6 && Math.abs(result[3] - e2) < 1e-6;
  var aqQdCheck = Math.abs(aq[0] - qd[0]) < 1e-6 && Math.abs(aq[1] - qd[1]) < 1e-6 && Math.abs(aq[2] - qd[2]) < 1e-6 && Math.abs(aq[3] - qd[3]) < 1e-6;

  var inverseBlock = mathBox(
    '<div class="matrix-inverse-line">' +
      equation('Q<sup>-1</sup>') +
      '<span>=</span>' +
      scalarFractionHTML(1, formatNum(data.detQ, 4)) +
      '<span>&times;</span>' +
      matrixHTML(data.adjQ, { digits: 4, wide: true }) +
    '</div>' +
    '<div class="result-sequence">' +
      equation('Numerically') +
      matrixHTML(data.invQ, { digits: 4, wide: true }) +
    '</div>'
  );

  html += stepBox(10, 'Verify Diagonalization',
    caption('Check that Q<sup>-1</sup>AQ = D') +
    mathBox(
      'det(Q) = (' + formatNum(q11, 4) + ')(' + formatNum(q22, 4) + ') &minus; (' + formatNum(q12, 4) + ')(' + formatNum(q21, 4) + ')<br>' +
      'det(Q) = <span class="highlight-green">' + formatNum(data.detQ, 4) + '</span><br>' +
      (Math.abs(data.detQ) < 1e-10
        ? '<span class="verify-fail">det(Q) = 0 &rarr; Q is singular</span><br>Eigenvectors are not linearly independent.'
        : '<span class="verify-pass">det(Q) &ne; 0 &rarr; Q is invertible</span><br>Eigenvectors are linearly independent.')
    ) +
    matrixResult('AQ', mat2(aq), 4) +
    matrixResult('QD', mat2(qd), 4) +
    (aqQdCheck ? '<p class="verify-pass">&#9989; AQ = QD</p>' : '<p class="verify-fail">&#10060; AQ &ne; QD</p>') +
    inverseBlock +
    transformationResult('Q<sup>-1</sup>AQ', mat2(result), data.dmat, 4) +
    '<p class="' + (diagCheck ? 'verify-pass' : 'verify-fail') + '">' +
      (diagCheck ? '&#9989; Q<sup>-1</sup>AQ = D &mdash; Matrix is diagonalizable' : '&#10060; Q<sup>-1</sup>AQ &ne; D &mdash; Verification failed') +
    '</p>'
  );

  html += renderApplications(data, a, b, c, d);
  html += renderFinalAnswer(e1, e2, v1, v2, v1norm, v2norm, true);
  document.getElementById('output').innerHTML = html;
}

function renderApplications(data, a, b, c, d) {
  var html = '';
  html += '<div class="step-box">';
  html += '<div class="step-header"><div class="step-num">11</div><div class="step-title">Applications of Diagonalization</div></div>';

  if (!data.ok) {
    html += '<p class="verify-fail">&#10060; This matrix is not diagonalizable with a real eigenbasis, so these diagonalization-based matrix functions cannot be computed using this method.</p>';
    html += '</div>';
    return html;
  }

  var e1 = data.e1;
  var e2 = data.e2;

  html += '<div class="collapsible open" id="app-powers">';
  html += '<div class="collapsible-header" onclick="toggleCollapse(this)"><span class="collapsible-arrow">&#9654;</span><span>&#128290; Matrix Powers</span></div>';
  html += '<div class="collapsible-content">';

  html += '<p style="color:#aaa; margin:15px 0 8px;"><strong>A&sup2;</strong></p>';
  html += mathBox(
    line(equation('A&sup2; = (QDQ<sup>-1</sup>)(QDQ<sup>-1</sup>)'), true) +
    line(equation('= QD(Q<sup>-1</sup>Q)DQ<sup>-1</sup>'), true) +
    line(equation('= QD(I)DQ<sup>-1</sup>'), true) +
    line(equation('= QD&sup2;Q<sup>-1</sup>'), true),
    true
  );
  var d2 = [e1 * e1, 0, 0, e2 * e2];
  var a2 = data.qmqInv(d2);
  html += matrixResult('D&sup2;', mat2(d2), 4);
  html += matrixResult('A&sup2; = QD&sup2;Q<sup>-1</sup>', mat2(a2), 4);

  html += '<p style="color:#aaa; margin:15px 0 8px;"><strong>A&sup3;</strong></p>';
  html += mathBox(line(equation('A&sup3; = A&sup2;A = (QD&sup2;Q<sup>-1</sup>)(QDQ<sup>-1</sup>) = QD&sup3;Q<sup>-1</sup>'), true), true);
  var d3 = [e1 * e1 * e1, 0, 0, e2 * e2 * e2];
  var a3 = data.qmqInv(d3);
  html += matrixResult('D&sup3;', mat2(d3), 4);
  html += matrixResult('A&sup3; = QD&sup3;Q<sup>-1</sup>', mat2(a3), 4);

  html += '<p style="color:#aaa; margin:15px 0 8px;"><strong>A<sup>n</sup></strong></p>';
  html += mathBox(
    line(equation('A<sup>n</sup> = QD<sup>n</sup>Q<sup>-1</sup>'), true) +
    caption('where') +
    '<div class="result-sequence">' +
      equation('D<sup>n</sup>') +
      matrixHTML([
        ['&lambda;<sub>1</sub><sup>n</sup>', 0],
        [0, '&lambda;<sub>2</sub><sup>n</sup>']
      ], { wide: true }) +
      matrixHTML([
        [formatNum(e1, 4) + '<sup>n</sup>', 0],
        [0, formatNum(e2, 4) + '<sup>n</sup>']
      ], { wide: true }) +
    '</div>',
    true
  );
  html += '<div class="power-input-row"><label>Enter n:</label><input type="number" id="powerN" value="5"><button class="btn" style="padding:8px 16px; font-size:0.9em;" onclick="computePower()">Compute A<sup>n</sup></button></div>';
  html += '<div id="powerResult"></div>';

  html += '</div></div>';

  html += '<div class="collapsible" id="app-sqrt">';
  html += '<div class="collapsible-header" onclick="toggleCollapse(this)"><span class="collapsible-arrow">&#9654;</span><span>&#8730; Matrix Square Root</span></div>';
  html += '<div class="collapsible-content">';
  if (e1 < 0 || e2 < 0) {
    html += '<p class="verify-fail" style="margin-top:10px;">&#10060; No real diagonalization-based square root is shown because at least one eigenvalue is negative.</p>';
    html += '<p class="note">&lambda;<sub>1</sub> = ' + formatNum(e1, 4) + ', &lambda;<sub>2</sub> = ' + formatNum(e2, 4) + '</p>';
  } else {
    var sqrtD = [Math.sqrt(e1), 0, 0, Math.sqrt(e2)];
    var sqrtA = data.qmqInv(sqrtD);
    html += renderMatrixFunction('&radic;A', '&radic;A = Q&radic;DQ<sup>-1</sup>', '&radic;D', mat2(sqrtD), mat2(sqrtA), 4);
    var verifySqrt = matMul(sqrtA, sqrtA);
    html += matrixResult('(&radic;A)(&radic;A)', mat2(verifySqrt), 4);
    var sqrtCheck = Math.abs(verifySqrt[0] - a) < 1e-5 && Math.abs(verifySqrt[1] - b) < 1e-5 && Math.abs(verifySqrt[2] - c) < 1e-5 && Math.abs(verifySqrt[3] - d) < 1e-5;
    html += '<p class="' + (sqrtCheck ? 'verify-pass' : 'verify-fail') + '">' + (sqrtCheck ? '&#9989; (&radic;A)(&radic;A) = A &mdash; Verified' : '&#10060; Verification failed') + '</p>';
  }
  html += '</div></div>';

  html += '<div class="collapsible" id="app-exp">';
  html += '<div class="collapsible-header" onclick="toggleCollapse(this)"><span class="collapsible-arrow">&#9654;</span><span>e<sup>A</sup> Matrix Exponential</span></div>';
  html += '<div class="collapsible-content">';
  var expD = [Math.exp(e1), 0, 0, Math.exp(e2)];
  var expA = data.qmqInv(expD);
  html += renderMatrixFunction('e<sup>A</sup>', 'e<sup>A</sup> = Qe<sup>D</sup>Q<sup>-1</sup>', 'e<sup>D</sup>', mat2(expD), mat2(expA), 4);
  html += '</div></div>';

  html += '<div class="collapsible" id="app-trig">';
  html += '<div class="collapsible-header" onclick="toggleCollapse(this)"><span class="collapsible-arrow">&#9654;</span><span>sin(A) and cos(A)</span></div>';
  html += '<div class="collapsible-content">';
  var sinD = [Math.sin(e1), 0, 0, Math.sin(e2)];
  var sinA = data.qmqInv(sinD);
  html += renderMatrixFunction('sin(A)', 'sin(A) = Q sin(D) Q<sup>-1</sup>', 'sin(D)', mat2(sinD), mat2(sinA), 4);
  var cosD = [Math.cos(e1), 0, 0, Math.cos(e2)];
  var cosA = data.qmqInv(cosD);
  html += renderMatrixFunction('cos(A)', 'cos(A) = Q cos(D) Q<sup>-1</sup>', 'cos(D)', mat2(cosD), mat2(cosA), 4);
  html += '</div></div>';

  html += '</div>';
  return html;
}

function renderFinalAnswer(e1, e2, v1, v2, v1norm, v2norm, hasV2) {
  var html = '<div class="result-box"><h3>&#9989; Final Answer</h3>';
  html += '<div class="eigen-item"><div class="eigen-label">Eigenvalue 1</div><div class="eigen-value">';
  html += '&lambda;<sub>1</sub> = <span class="lambda">' + formatNum(e1, 4) + '</span><br>';
  html += '<div class="matrix-row-display" style="justify-content:flex-start;">v<sub>1</sub> = ' + columnHTML([v1.x, v1.y], 4) + '</div>';
  if (!v1.clean) html += '<span class="note">Normalized: ' + vectorText(v1norm, 4) + '</span>';
  html += '</div></div>';

  if (hasV2 && v2) {
    html += '<div class="eigen-item"><div class="eigen-label">Eigenvalue 2</div><div class="eigen-value">';
    html += '&lambda;<sub>2</sub> = <span class="lambda">' + formatNum(e2, 4) + '</span><br>';
    html += '<div class="matrix-row-display" style="justify-content:flex-start;">v<sub>2</sub> = ' + columnHTML([v2.x, v2.y], 4) + '</div>';
    if (!v2.clean) html += '<span class="note">Normalized: ' + vectorText(v2norm, 4) + '</span>';
    html += '</div></div>';
  }

  html += '</div>';
  return html;
}

function computePower() {
  var n = parseInt(document.getElementById('powerN').value, 10);
  if (isNaN(n) || n < 0) {
    document.getElementById('powerResult').innerHTML = '<p class="verify-fail">Please enter a non-negative integer.</p>';
    return;
  }

  var a = parseFloat(document.getElementById('a11').value) || 0;
  var b = parseFloat(document.getElementById('a12').value) || 0;
  var c = parseFloat(document.getElementById('a21').value) || 0;
  var d = parseFloat(document.getElementById('a22').value) || 0;
  var data = getDiagonalizationData(a, b, c, d);

  if (!data.ok) {
    document.getElementById('powerResult').innerHTML = '<p class="verify-fail">A<sup>n</sup> cannot be computed by this diagonalization method for the current matrix.</p>';
    return;
  }

  var dn = [Math.pow(data.e1, n), 0, 0, Math.pow(data.e2, n)];
  var an = data.qmqInv(dn);
  var html = '';
  html += matrixResult('D<sup>' + n + '</sup>', mat2(dn), 4);
  html += matrixResult('A<sup>' + n + '</sup> = QD<sup>' + n + '</sup>Q<sup>-1</sup>', mat2(an), 4);
  document.getElementById('powerResult').innerHTML = html;
}

calculate();
</script>
